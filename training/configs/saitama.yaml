region: saitama
target: price
latest_training_year: 2025
train_start_year: 2020
test_year: 2025
processed_path: data/processed/saitama.parquet
output_dir: outputs/models
frontend_public_dir: ../frontend/public
model:
  n_estimators: 300
  learning_rate: 0.05
  random_state: 42
tuning:
  enabled: true
  n_trials: 30
  validation_year: 2024
  early_stopping_rounds: 50
  max_estimators: 1000
  learning_rate_min: 0.02
  learning_rate_max: 0.08
  num_leaves_min: 16
  num_leaves_max: 96
  max_depth_min: 3
  max_depth_max: 10
  min_child_samples_min: 30
  min_child_samples_max: 300
  size_penalty_per_iteration: 200
features:
  - area
  - age
  - station_distance
  - prefecture
  - municipality
  - station
  - room_layout
  - building_type
  - transaction_year
categorical_features:
  - prefecture
  - municipality
  - station
  - room_layout
  - building_type
